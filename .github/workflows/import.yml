name: Import Anthropic Blog To Notion

on:
  schedule:
    # 08:00 in Asia/Hong_Kong / Asia/Shanghai.
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Scan and classify without AI/Notion writes"
        required: false
        type: boolean
        default: false
      limit:
        description: "Maximum new Notion pages to create; dry-run shows that many kept articles; 0 uses MAX_POSTS_PER_RUN"
        required: false
        type: number
        default: 0

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Run importer
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID }}
          NOTION_VERSION: ${{ vars.NOTION_VERSION || '2026-03-11' }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          TRANSLATION_PROMPT: ${{ vars.TRANSLATION_PROMPT }}
          TRANSLATION_PROMPT_FILE: prompts/translation_prompt.md
          AI_MAX_INPUT_CHARS: ${{ vars.AI_MAX_INPUT_CHARS || '120000' }}
          AI_MAX_RETRIES: ${{ vars.AI_MAX_RETRIES || '3' }}
          AI_RETRY_BASE_DELAY_SECONDS: ${{ vars.AI_RETRY_BASE_DELAY_SECONDS || '2' }}
          AI_TIMEOUT_SECONDS: ${{ vars.AI_TIMEOUT_SECONDS || '180' }}
          MAX_POSTS_PER_RUN: ${{ vars.MAX_POSTS_PER_RUN || '20' }}
          NOTION_RATE_LIMIT_PER_SECOND: ${{ vars.NOTION_RATE_LIMIT_PER_SECOND || '3' }}
          NOTION_MAX_RETRIES: ${{ vars.NOTION_MAX_RETRIES || '5' }}
          REQUEST_DELAY_SECONDS: ${{ vars.REQUEST_DELAY_SECONDS || '0.4' }}
          CLASSIFIER_RULES_FILE: rules/classifier_rules.json
          FAILED_ARTICLE_RETRY_PASSES: ${{ vars.FAILED_ARTICLE_RETRY_PASSES || '1' }}
        run: |
          args=()
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            args+=(--dry-run)
          fi
          if [ "${{ github.event.inputs.limit || '0' }}" != "0" ]; then
            args+=(--limit "${{ github.event.inputs.limit }}")
          fi
          set +e
          output="$(python -m anthropic_blog2notion run "${args[@]}" 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          {
            echo "## Anthropic Blog Import"
            echo
            echo '```text'
            printf '%s\n' "$output"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"
